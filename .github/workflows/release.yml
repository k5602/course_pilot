name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  APP_NAME: course_pilot

jobs:
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgraphene-1.0-dev \
            pkg-config \
            libsqlite3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all --locked

  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: validate
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: course-pilot-linux-x64.tar.gz
            binary: course_pilot

          - os: windows-latest
            platform: windows
            artifact: course-pilot-windows-x64.zip
            binary: course_pilot.exe

    steps:
      - name: Configure git (Windows)
        if: matrix.platform == 'windows'
        run: git config --global core.autocrlf input
        shell: pwsh

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSYS2 (Windows)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-librsvg
            mingw-w64-ucrt-x86_64-gstreamer
            mingw-w64-ucrt-x86_64-gst-plugins-base
            mingw-w64-ucrt-x86_64-gst-plugins-good
            mingw-w64-ucrt-x86_64-gst-plugins-bad
            mingw-w64-ucrt-x86_64-gst-plugins-ugly
            mingw-w64-ucrt-x86_64-gst-libav

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgraphene-1.0-dev \
            pkg-config \
            libsqlite3-dev

      - name: Setup Rust (Linux)
        if: matrix.platform == 'linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Verify build environment (Windows)
        if: matrix.platform == 'windows'
        run: |
          rustc --version
          cargo --version
          pkg-config --cflags --libs gtk4
          pkg-config --cflags --libs libadwaita-1
          pkg-config --cflags --libs gstreamer-1.0
        shell: msys2 {0}

      - name: Rust cache (Linux)
        if: matrix.platform == 'linux'
        uses: Swatinem/rust-cache@v2

      - name: Build release (Linux)
        if: matrix.platform == 'linux'
        run: cargo build --release --locked

      - name: Build release (Windows)
        if: matrix.platform == 'windows'
        run: cargo build --release --locked
        shell: msys2 {0}
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p release-artifacts
          cp "target/release/${APP_NAME}" ./release-artifacts/
          chmod +x "./release-artifacts/${APP_NAME}"
          strip "./release-artifacts/${APP_NAME}" || true
          tar -czf "${{ matrix.artifact }}" -C release-artifacts .

      - name: Collect DLLs (Windows)
        if: matrix.platform == 'windows'
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/release/${APP_NAME}.exe" dist/

          for dll in $(ldd "target/release/${APP_NAME}.exe" | grep '/ucrt64/' | awk '{print $3}' | sort -u); do
            cp "$dll" dist/
          done

          mkdir -p dist/gstreamer-1.0
          cp /ucrt64/lib/gstreamer-1.0/*.dll dist/gstreamer-1.0/

          mkdir -p dist/share/glib-2.0/schemas
          cp /ucrt64/share/glib-2.0/schemas/*.gschema.xml dist/share/glib-2.0/schemas/
          glib-compile-schemas dist/share/glib-2.0/schemas/

          mkdir -p dist/lib/gdk-pixbuf-2.0/2.10.0/loaders
          cp /ucrt64/lib/gdk-pixbuf-2.0/2.10.0/loaders/*.dll dist/lib/gdk-pixbuf-2.0/2.10.0/loaders/
          cp "/ucrt64/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" dist/lib/gdk-pixbuf-2.0/2.10.0/ 2>/dev/null || true

          mkdir -p dist/share/icons
          cp -r /ucrt64/share/icons/Adwaita dist/share/icons/
          cp -r /ucrt64/share/icons/hicolor dist/share/icons/

          echo '@echo off' > dist/course_pilot.bat
          echo 'set "GST_PLUGIN_PATH=%~dp0gstreamer-1.0"' >> dist/course_pilot.bat
          echo 'set "GSETTINGS_SCHEMA_DIR=%~dp0share\glib-2.0\schemas"' >> dist/course_pilot.bat
          echo 'set "GDK_PIXBUF_MODULE_FILE=%~dp0lib\gdk-pixbuf-2.0\2.10.0\loaders.cache"' >> dist/course_pilot.bat
          echo '"%~dp0course_pilot.exe" %*' >> dist/course_pilot.bat
        shell: msys2 {0}

      - name: Package ZIP (Windows)
        if: matrix.platform == 'windows'
        run: Compress-Archive -Path dist\* -DestinationPath "${{ matrix.artifact }}"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-tarball
          path: ${{ matrix.artifact }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-tarball"
          merge-multiple: true

      - name: Compute checksums
        id: meta
        run: |
          set -euo pipefail
          linux_tar="course-pilot-linux-x64.tar.gz"
          win_zip="course-pilot-windows-x64.zip"

          tar_size=$(du -h "$linux_tar" | cut -f1)
          tar_sha=$(sha256sum "$linux_tar" | cut -d' ' -f1)
          zip_size=$(du -h "$win_zip" | cut -f1)
          zip_sha=$(sha256sum "$win_zip" | cut -d' ' -f1)
          {
            echo "tar_size=$tar_size"
            echo "tar_sha=$tar_sha"
            echo "zip_size=$zip_size"
            echo "zip_sha=$zip_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          notes_file="release_notes.md"

          if [ -f CHANGELOG.md ]; then
            awk -v v="$version" '
              BEGIN {found=0}
              $0 ~ "^## \\[" v "\\]" {found=1; print; next}
              found && $0 ~ "^## \\[" {exit}
              found {print}
            ' CHANGELOG.md > "$notes_file"
          fi

          if [ ! -s "$notes_file" ]; then
            echo "## [${version}] - $(date -u +%Y-%m-%d)" > "$notes_file"
            echo "- Release ${GITHUB_REF_NAME}" >> "$notes_file"
          fi

          {
            echo ""
            echo "### Downloads"
            echo "| Platform | File | Size | SHA256 |"
            echo "|----------|------|------|--------|"
            echo "| Linux x64 | course-pilot-linux-x64.tar.gz | ${{ steps.meta.outputs.tar_size }} | ${{ steps.meta.outputs.tar_sha }} |"
            echo "| Windows x64 | course-pilot-windows-x64.zip | ${{ steps.meta.outputs.zip_size }} | ${{ steps.meta.outputs.zip_sha }} |"
            echo ""
            echo "### Installation (Linux)"
            echo "Download the \`.tar.gz\`, extract it, and run \`course_pilot\`:"
            echo ""
            echo "\`\`\`bash"
            echo "tar -xzf course-pilot-linux-x64.tar.gz"
            echo "./course_pilot"
            echo "\`\`\`"
            echo ""
            echo "### Installation (Windows)"
            echo "Download the \`.zip\`, extract it, and run \`course_pilot.exe\`. All GTK4, libadwaita, and GStreamer runtimes are bundled."
            echo ""
            echo "\`\`\`powershell"
            echo "Expand-Archive -Path course-pilot-windows-x64.zip -DestinationPath ."
            echo ".\\course_pilot.exe"
            echo "\`\`\`"
            echo ""
            echo "### System Requirements"
            echo "- **Linux**: Ubuntu 22.04+ / Debian 12+ / Fedora 38+ / Arch Linux (GTK4 + libadwaita + GStreamer)"
            echo "- **Windows**: Windows 10+ (64-bit); all runtimes bundled"
          } >> "$notes_file"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            course-pilot-linux-x64.tar.gz
            course-pilot-windows-x64.zip
          tag_name: ${{ github.ref_name }}
          name: Course Pilot ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
