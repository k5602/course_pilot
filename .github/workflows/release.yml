name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  APP_NAME: course_pilot
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: course-pilot-linux-x64.tar.gz
            binary: course_pilot
          # - os: windows-2022
          #   platform: windows
          #   artifact: course-pilot-windows-x64.zip
          #   binary: course_pilot.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Free Disk Space (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        shell: bash

      - name: Configure Cargo git CLI
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [net]
          git-fetch-with-cli = true
          EOF
        shell: bash

      - name: Enable long paths (Windows)
        if: matrix.platform == 'windows'
        run: git config --system core.longpaths true
        shell: pwsh

      - name: Enable long paths in registry (Windows)
        if: matrix.platform == 'windows'
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1
        shell: pwsh

      - name: Install NASM (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/setup-nasm@v1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'windows' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgraphene-1.0-dev \
            pkg-config \
            libsqlite3-dev
        shell: bash

      - name: Build release binary (Linux)
        if: matrix.platform == 'linux'
        run: cargo build --release
        shell: bash

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p release-artifacts
          cp "target/release/${APP_NAME}" ./release-artifacts/
          chmod +x "./release-artifacts/${APP_NAME}"
          strip "./release-artifacts/${APP_NAME}" || true
          tar -czf "${{ matrix.artifact }}" -C release-artifacts .
        shell: bash

      # - name: Build release binary (Windows)
      #   if: matrix.platform == 'windows'
      #   run: cargo build --release
      #   env:
      #     RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
      #   shell: pwsh

      # - name: Package (Windows)
      #   if: matrix.platform == 'windows'
      #   run: |
      #     Compress-Archive -Path target/release/${{ matrix.binary }} -DestinationPath ${{ matrix.artifact }}
      #   shell: pwsh

      - name: Upload Linux Tarball
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: course-pilot-linux-x64.tar.gz

      # - name: Upload Windows Archive
      #   if: matrix.platform == 'windows'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: windows-zip
      #     path: course-pilot-windows-x64.zip

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux Tarball
        uses: actions/download-artifact@v4
        with:
          name: linux-tarball

      # - name: Download Windows Archive
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: windows-zip

      - name: Compute checksums and sizes
        id: meta
        run: |
          set -euo pipefail
          linux_tar="course-pilot-linux-x64.tar.gz"
          # win_zip="course-pilot-windows-x64.zip"

          tar_size=$(du -h "$linux_tar" | cut -f1)
          # zip_size=$(du -h "$win_zip" | cut -f1)

          tar_sha=$(sha256sum "$linux_tar" | cut -d' ' -f1)
          # zip_sha=$(sha256sum "$win_zip" | cut -d' ' -f1)

          {
            echo "tar_size=$tar_size"
            echo "tar_sha=$tar_sha"
            # echo "zip_size=$zip_size"
            # echo "zip_sha=$zip_sha"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Prepare release notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          notes_file="release_notes.md"

          if [ -f CHANGELOG.md ]; then
            awk -v v="$version" '
              BEGIN {found=0}
              $0 ~ "^## \\[" v "\\]" {found=1; print; next}
              found && $0 ~ "^## \\[" {exit}
              found {print}
            ' CHANGELOG.md > "$notes_file"
          fi

          if [ ! -s "$notes_file" ]; then
            echo "## [${version}] - $(date -u +%Y-%m-%d)" > "$notes_file"
            echo "- Release ${GITHUB_REF_NAME}" >> "$notes_file"
          fi

          {
            echo ""
            echo "### Downloads"
            echo "| Platform | File | Size | SHA256 |"
            echo "|----------|------|------|--------|"
            echo "| Linux (Generic) | course-pilot-linux-x64.tar.gz | ${{ steps.meta.outputs.tar_size }} | ${{ steps.meta.outputs.tar_sha }} |"
            # echo "| Windows x64 | course-pilot-windows-x64.zip | ${{ steps.meta.outputs.zip_size }} | ${{ steps.meta.outputs.zip_sha }} |"
            echo ""
            echo "### Installation (Linux)"
            echo "Download the \`.tar.gz\`, extract it, and run \`course_pilot\`:"
            echo ""
            echo "```bash"
            echo "tar -xzf course-pilot-linux-x64.tar.gz"
            echo "./course_pilot"
            echo "```"
            echo ""
            echo "### System Requirements"
            echo "- **Linux**: Ubuntu 22.04+ / Debian 12+ / Fedora 38+ / Arch Linux (GTK4 + libadwaita + GStreamer)"
          } >> "$notes_file"
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            course-pilot-linux-x64.tar.gz
            # course-pilot-windows-x64.zip
          tag_name: ${{ github.ref_name }}
          name: Course Pilot ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
